# See https://docs.giantswarm.io/reference/platform-api/chart-metadata/
# for details and background.

apiVersion: v2

# Version of the packaged app. Kept in sync with the upstream chart's
# appVersion by sync/sync.sh.
appVersion: "0.65.0"

# Make sure your name DOES NOT end in "app" or "-app".
name: cloudwatch-exporter

# Please describe what the app provides in a sentence or two.
description: Yet Another CloudWatch Exporter (yace) - a CloudWatch metrics exporter for Prometheus.

# URL of the GitHub repository that is the source of this Chart.yaml file.
home: https://github.com/giantswarm/cloudwatch-exporter-app

# If you have an icon/logo, you should add it to https://github.com/giantswarm/web-assets
# and set the final URL here.
icon: https://s.giantswarm.io/app-icons/giantswarm/1/light.svg

keywords:
  - cloudwatch
  - prometheus
  - exporter
  - aws
  - yace
sources:
  - https://github.com/prometheus-community/yet-another-cloudwatch-exporter
  - https://github.com/prometheus-community/helm-charts
type: application
version: 0.0.0-dev
annotations:
  # Adapt to 'giantswarm' if this application is not to be deployed by customers
  io.giantswarm.application.audience: all
  # Adapt to 'true' if Giant Swarm takes responsibility for this app where it's deplyed
  io.giantswarm.application.managed: "false"
  io.giantswarm.application.team: cabbage
