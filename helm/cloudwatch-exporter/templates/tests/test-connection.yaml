{{- if .Values.testConnection -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "yet-another-cloudwatch-exporter.fullname" . }}-test-connection"
  labels:
    {{- include "yet-another-cloudwatch-exporter.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      command: ['wget']
      args: ['{{ include "yet-another-cloudwatch-exporter.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
{{- end }}
