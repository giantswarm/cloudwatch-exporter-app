apiVersion: vendir.k14s.io/v1alpha1
kind: Config
directories:
- path: vendor
  contents:
  - path: cloudwatch-exporter
    helmChart:
      name: prometheus-yet-another-cloudwatch-exporter
      version: "0.46.1"
      repository:
        url: https://prometheus-community.github.io/helm-charts
- path: helm/cloudwatch-exporter
  contents:
  - path: .
    directory:
      path: vendor/cloudwatch-exporter
    ignorePaths:
      - Chart.yaml
      - Chart.lock
      # Hardened in-place for Giant Swarm Pod Security Standards (restricted);
      # owned by us so vendir does not revert the securityContext on sync.
      - templates/tests/test-connection.yaml
